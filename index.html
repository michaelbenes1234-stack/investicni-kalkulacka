<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;max-width:1100px;margin:auto;padding:20px}
h1{text-align:center;color:#0a66ff}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:20px}
input{padding:10px;margin:5px;width:180px}
button{padding:10px 15px;background:#0a66ff;color:white;border:none;border-radius:6px}
.result{font-weight:bold;color:#0a66ff;margin-top:10px}
</style>
</head>
<body>
<h1>📈 Investiční Kalkulačky CZ</h1>
<div class="card">
<h2>DCA kalkulačka</h2>
<input id="m" type="number" value="5000"> Měsíčně
<input id="r" type="number" value="10"> %
<input id="y" type="number" value="20"> Let
<button onclick="dca()">Spočítat</button>
<div id="dcares" class="result"></div>
</div>
<div class="card">
<h2>FIRE kalkulačka</h2>
<input id="f" type="number" value="30000"> Měsíční výdaje
<button onclick="fire()">Spočítat</button>
<div id="fireres" class="result"></div>
</div>
<script>
function fmt(x){return Math.round(x).toLocaleString('cs-CZ')+' Kč';}
function dca(){let m=+m.value,r=+document.getElementById('r').value/100/12,n=+y.value*12,v=0;for(let i=0;i<n;i++)v=(v+m)*(1+r);dcares.innerText='Budoucí hodnota: '+fmt(v);}
function fire(){let e=+f.value*12;fireres.innerText='Potřebné portfolio: '+fmt(e*25);}
dca();fire();
</script>
</body>
