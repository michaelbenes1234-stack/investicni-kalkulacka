<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Investiční kalkulačka Pro</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px;background:#f5f7fb}.card{background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.1)}input,button{padding:10px;margin:6px 0;width:100%;box-sizing:border-box}button{background:#0a66ff;color:#fff;border:none;border-radius:8px}#result{font-size:24px;font-weight:bold;margin-top:15px}</style></head><body><div class="card"><h1>📈 Investiční DCA Kalkulačka Pro</h1><label>Měsíční investice (Kč)</label><input id="monthly" type="number" value="5000"><label>Roční výnos (%)</label><input id="rate" type="number" value="10"><label>Počet let</label><input id="years" type="number" value="20"><button onclick="calc()">Spočítat</button><div id="result"></div><canvas id="chart"></canvas></div><script>let chart;function calc(){let m=+monthly.value,r=(+rate.value/100),y=+years.value;let value=0,labels=[],data=[];for(let year=1;year<=y;year++){for(let i=0;i<12;i++)value=(value+m)*(1+r/12);labels.push(year);data.push(Math.round(value));}document.getElementById('result').innerHTML='Budoucí hodnota portfolia: '+value.toLocaleString('cs-CZ',{maximumFractionDigits:0})+' Kč';const ctx=document.getElementById('chart');if(chart)chart.destroy();chart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'Hodnota portfolia (Kč)',data:data,borderColor:'blue'}]},options:{responsive:true}});}window.onload=calc;</script></body></html>
